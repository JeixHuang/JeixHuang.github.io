{{ define "main" }}
  <h1 class="page-title">Tags</h1>

  <ul class="tag-list">
    {{ range .Data.Terms.Alphabetical }}
      {{ $pages := partial "public-posts.html" .Pages }}
      {{ if gt (len $pages) 0 }}
      <li class="tag-item">
        <a href="{{ .Page.RelPermalink }}">#{{ .Page.Title }}</a>
        <span class="tag-count">({{ len $pages }})</span>
      </li>
      {{ end }}
    {{ end }}
  </ul>
{{ end }}
